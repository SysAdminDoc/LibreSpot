ShortDescription: SpotX + Spicetify unified installer for Spotify customization on Windows
Description: |-
  LibreSpot is a one-click installer that combines SpotX ad-blocking and Spicetify
  theming/extensions into a single GUI. Easy mode applies recommended settings;
  Custom mode lets you pick SpotX flags, themes, and extensions individually.
  Maintenance mode manages updates, repairs, and the auto-reapply watcher.
