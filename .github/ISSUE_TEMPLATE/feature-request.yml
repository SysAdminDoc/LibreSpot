name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What problem does this solve or what workflow does it improve?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Which part of LibreSpot?
      options:
        - PowerShell script UI
        - WPF Desktop shell
        - Fleet CLI / automation
        - SpotX integration
        - Spicetify / themes / extensions
        - Auto-reapply watcher
        - Installer / packaging
        - Documentation
        - Other
    validations:
      required: true
