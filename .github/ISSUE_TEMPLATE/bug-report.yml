name: Bug Report
description: Report a bug or unexpected behavior in LibreSpot
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix the issue.

        **Do not paste secrets, tokens, or private logs.** If your issue involves sensitive information, use [private vulnerability reporting](https://github.com/SysAdminDoc/LibreSpot/security/advisories/new) instead.

  - type: dropdown
    id: mode
    attributes:
      label: Product Surface
      description: Which LibreSpot surface or workflow showed the issue?
      options:
        - Recommended setup
        - Custom setup
        - Maintenance
        - Fleet CLI
        - Stable PowerShell script / one-liner
        - Auto-reapply watcher
        - Crash / recovery window
    validations:
      required: true

  - type: input
    id: librespot-version
    attributes:
      label: LibreSpot Version
      description: "Found in the title bar, the script header, or `LibreSpot.Cli.exe version --json`"
      placeholder: "e.g. v3.7.4 or v4.0.0-preview.17"
    validations:
      required: true

  - type: dropdown
    id: librespot-variant
    attributes:
      label: LibreSpot Variant
      description: Which variant are you running?
      options:
        - PowerShell script (LibreSpot.ps1)
        - Compiled executable (LibreSpot.exe)
        - WPF Desktop shell (LibreSpot-Desktop.exe)
        - Fleet CLI (LibreSpot.Cli.exe)
    validations:
      required: true

  - type: input
    id: spotify-version
    attributes:
      label: Spotify Version
      description: "Right-click Spotify tray icon > About, or check Settings > About"
      placeholder: "e.g. 1.2.92.123"
    validations:
      required: true

  - type: dropdown
    id: spotify-source
    attributes:
      label: Spotify Source
      description: Where was Spotify installed from?
      options:
        - Microsoft Store
        - Spotify website / standalone installer
        - SpotX-managed install
        - Unsure
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      description: "Run `winver` or check Settings > System > About"
      placeholder: "e.g. Windows 11 23H2 (build 22631)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the issue.
      placeholder: |
        1. Open LibreSpot
        2. Open Recommended setup
        3. Select Apply recommended setup
        4. ...
    validations:
      required: true

  - type: input
    id: spicetify-version
    attributes:
      label: Spicetify Version
      description: "Run `spicetify --version` in a terminal, or leave blank if not installed"
      placeholder: "e.g. 2.43.2"
    validations:
      required: false

  - type: textarea
    id: support-bundle
    attributes:
      label: Support Bundle
      description: |
        **Preferred:** In the WPF Desktop shell, go to Maintenance > Support bundle, review the selected evidence, export it, then drag the `.zip` file here.
        The bundle is local-only, redacted, and never uploaded by LibreSpot. Review it before attaching.
        If export is unavailable, provide only the concise error text below; do not paste config files, tokens, or full raw logs.
      placeholder: "Drag and drop the reviewed .zip file here."
    validations:
      required: false

  - type: input
    id: operation-id
    attributes:
      label: Operation ID
      description: "Copy it from the WPF activity dialog, CLI JSON/plain output, crash report, or support-bundle manifest. Leave blank if no run started."
      placeholder: "e.g. a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Concise Error Text (fallback)
      description: "If you cannot attach a support bundle, paste only the relevant error message after removing usernames, local paths, credentials, tokens, and private URLs."
      render: text
    validations:
      required: false
