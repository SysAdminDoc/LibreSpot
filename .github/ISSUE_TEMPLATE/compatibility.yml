name: Compatibility Breakage
description: Report that LibreSpot stopped working after a Spotify, SpotX, or Spicetify update
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when LibreSpot was working before and broke after an update to Spotify, SpotX, Spicetify, or Windows.

  - type: input
    id: librespot-version
    attributes:
      label: LibreSpot Version
      placeholder: "e.g. v3.7.4 or v4.0.0-preview.17"
    validations:
      required: true

  - type: input
    id: spotify-version
    attributes:
      label: Current Spotify Version
      description: The version that is now broken.
      placeholder: "e.g. 1.2.93.400"
    validations:
      required: true

  - type: input
    id: previous-spotify
    attributes:
      label: Previous Spotify Version (if known)
      description: The last version that worked correctly.
      placeholder: "e.g. 1.2.92.123"
    validations:
      required: false

  - type: dropdown
    id: what-broke
    attributes:
      label: What broke?
      description: Select all that apply.
      multiple: true
      options:
        - Spotify shows ads again
        - Spotify has a blank/white screen
        - Spicetify theme is missing or broken
        - Extensions stopped working
        - LibreSpot install fails with an error
        - Auto-reapply watcher stopped working
        - Other
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      placeholder: "e.g. Windows 11 23H2"
    validations:
      required: true

  - type: dropdown
    id: librespot-variant
    attributes:
      label: LibreSpot Variant
      description: Which variant are you running?
      options:
        - PowerShell script (LibreSpot.ps1)
        - Compiled executable (LibreSpot.exe)
        - WPF Desktop shell (LibreSpot-Desktop.exe)
        - Fleet CLI (LibreSpot.Cli.exe)
    validations:
      required: true

  - type: input
    id: spicetify-version
    attributes:
      label: Spicetify Version
      description: "Run `spicetify --version` in a terminal, or leave blank if not installed"
      placeholder: "e.g. 2.43.2"
    validations:
      required: false

  - type: textarea
    id: support-bundle
    attributes:
      label: Support Bundle
      description: |
        **Preferred:** In the WPF Desktop shell, go to Maintenance > Support bundle, review the selected evidence, export it, then drag the `.zip` file here.
        The bundle is local-only, redacted, and never uploaded by LibreSpot. Review it before attaching.
        If export is unavailable, provide only concise redacted error text below; do not paste config files, tokens, or full raw logs.
      placeholder: "Drag and drop the reviewed .zip file here."
    validations:
      required: false

  - type: input
    id: operation-id
    attributes:
      label: Operation ID
      description: "Copy it from WPF activity, CLI output, a crash report, or the support-bundle manifest."
      placeholder: "e.g. a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Details
      description: Any additional context about what changed and when. If no support bundle is available, include only concise error text with private data removed.
    validations:
      required: false
