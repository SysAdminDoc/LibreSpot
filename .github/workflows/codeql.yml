# CodeQL — static application security testing for the C# WPF project.
#
# Scans on PR and push to main. The C# analysis covers the WPF desktop
# shell and test project. PowerShell SARIF upload from PSScriptAnalyzer
# will be added once the Pester/PSScriptAnalyzer CI lane ships.
name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ csharp ]

    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup .NET 10
        # actions/setup-dotnet v4.3.1
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        # github/codeql-action/init v3
        uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build
        run: |
          dotnet restore src/LibreSpot.Desktop/LibreSpot.Desktop.csproj --locked-mode
          dotnet build src/LibreSpot.Desktop/LibreSpot.Desktop.csproj -c Release --no-restore

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze v3
        uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb
        with:
          category: "/language:${{ matrix.language }}"
