# CodeQL — static application security testing for the C# WPF project.
#
# Scans on PR and push to main. The C# analysis covers the WPF desktop
# shell and test project. PowerShell SARIF upload from PSScriptAnalyzer
# will be added once the Pester/PSScriptAnalyzer CI lane ships.
name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ csharp ]

    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup .NET 10
        # actions/setup-dotnet v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        # github/codeql-action/init v3
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build
        run: |
          dotnet restore src/LibreSpot.Desktop/LibreSpot.Desktop.csproj --locked-mode
          dotnet build src/LibreSpot.Desktop/LibreSpot.Desktop.csproj -c Release --no-restore

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze v3
        uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb
        with:
          category: "/language:${{ matrix.language }}"
