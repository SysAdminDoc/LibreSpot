name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup .NET 10
        # actions/setup-dotnet v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Restore with locked NuGet audit
        run: |
          dotnet restore src/LibreSpot.Desktop/LibreSpot.Desktop.csproj --locked-mode -p:AuditPipeline=true
          dotnet restore tests/LibreSpot.Desktop.Tests/LibreSpot.Desktop.Tests.csproj --no-dependencies -p:AuditPipeline=true

      - name: PowerShell syntax check (Windows PowerShell 5.1)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Host: $($PSVersionTable.PSVersion)"
          $files = @('LibreSpot.ps1', 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1')
          foreach ($file in $files) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors) | Out-Null
              if ($parseErrors.Count -gt 0) {
                  $parseErrors | ForEach-Object {
                      Write-Host "  $($_.Message) at $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber)"
                  }
                  throw "$file has $($parseErrors.Count) parse error(s)."
              }
              Write-Host "  $file parsed cleanly"
          }

      - name: PowerShell syntax check (PowerShell 7)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Host: $($PSVersionTable.PSVersion)"
          $files = @('LibreSpot.ps1', 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1')
          foreach ($file in $files) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors) | Out-Null
              if ($parseErrors.Count -gt 0) {
                  $parseErrors | ForEach-Object {
                      Write-Host "  $($_.Message) at $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber)"
                  }
                  throw "$file has $($parseErrors.Count) parse error(s)."
              }
              Write-Host "  $file parsed cleanly"
          }

      - name: PSScriptAnalyzer lint
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $includeRules = @(
              'PSAvoidUsingCmdletAliases'
              'PSAvoidUsingInvokeExpression'
              'PSAvoidUsingPlainTextForPassword'
              'PSUseApprovedVerbs'
          )
          $files = @('LibreSpot.ps1', 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1')
          $allResults = @()
          foreach ($file in $files) {
              $results = Invoke-ScriptAnalyzer -Path $file -IncludeRule $includeRules -Severity Warning,Error
              foreach ($r in $results) {
                  $allResults += [pscustomobject]@{
                      File     = $file
                      Line     = $r.Line
                      Rule     = $r.RuleName
                      Severity = $r.Severity
                      Message  = $r.Message -replace '\|','\|'
                  }
                  Write-Host "::warning file=$file,line=$($r.Line)::[$($r.RuleName)] $($r.Message)"
              }
          }
          $summary = @()
          $summary += "## PSScriptAnalyzer Results"
          $summary += ""
          if ($allResults.Count -eq 0) {
              $summary += ":white_check_mark: No warnings from curated rule set."
          } else {
              $summary += ":warning: **$($allResults.Count) finding(s)** (non-blocking)"
              $summary += ""
              $summary += "| File | Line | Rule | Severity | Message |"
              $summary += "|------|-----:|------|----------|---------|"
              foreach ($r in $allResults | Select-Object -First 50) {
                  $summary += "| ``$($r.File)`` | $($r.Line) | ``$($r.Rule)`` | $($r.Severity) | $($r.Message) |"
              }
              if ($allResults.Count -gt 50) {
                  $summary += ""
                  $summary += "_Showing first 50 of $($allResults.Count) findings._"
              }
          }
          $summary += ""
          $summary += "_Rules: $($includeRules -join ', ')_"
          $summary -join "`n" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "PSScriptAnalyzer: $($allResults.Count) finding(s) from $($includeRules.Count) rules"

      - name: XAML parse smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Add-Type -AssemblyName PresentationFramework
          $script = Get-Content -Path LibreSpot.ps1 -Raw
          $xamlBlocks = [regex]::Matches($script, '(?ms)^\s*\$(?:xaml|dlgXaml)\s*=\s*@"\r?\n(?<xaml>.*?)\r?\n"@')
          if ($xamlBlocks.Count -lt 2) {
              throw "Expected main and dialog XAML here-strings, found $($xamlBlocks.Count)."
          }
          foreach ($block in $xamlBlocks) {
              $reader = [System.Xml.XmlReader]::Create([System.IO.StringReader]::new($block.Groups['xaml'].Value))
              [Windows.Markup.XamlReader]::Load($reader) | Out-Null
          }

      - name: Run unit tests
        run: dotnet test tests/LibreSpot.Desktop.Tests/LibreSpot.Desktop.Tests.csproj -c Release --nologo --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results on failure
        if: ${{ failure() }}
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results
          path: TestResults/
          retention-days: 5

      - name: Write CI summary
        if: ${{ always() }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $trx = Get-ChildItem -Path TestResults -Filter '*.trx' -ErrorAction SilentlyContinue | Select-Object -First 1
          $summary = @()
          $summary += "## CI Summary"
          $summary += ""
          $summary += "| Check | Status |"
          $summary += "|-------|--------|"

          # NuGet restore
          $lockExists = Test-Path 'src/LibreSpot.Desktop/packages.lock.json'
          $summary += "| NuGet locked restore | $( if ($lockExists) { ':white_check_mark: Lock file present' } else { ':x: Missing' } ) |"

          # Test results from TRX
          if ($trx) {
              [xml]$xml = Get-Content $trx.FullName
              $counters = $xml.TestRun.ResultSummary.Counters
              $total = [int]$counters.total
              $passed = [int]$counters.passed
              $failed = [int]$counters.failed
              $status = if ($failed -gt 0) { ":x: $failed failed" } else { ":white_check_mark: All $passed passed" }
              $summary += "| Unit tests ($total total) | $status |"
          } else {
              $summary += "| Unit tests | :warning: No TRX output found |"
          }

          # Version sync check
          $monolith = Get-Content 'LibreSpot.ps1' -Raw
          $backend = Get-Content 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1' -Raw
          $mv = if ($monolith -match "\`$global:VERSION\s*=\s*'([^']+)'") { $Matches[1] } else { '?' }
          $bv = if ($backend -match "\`$global:VERSION\s*=\s*'([^']+)'") { $Matches[1] } else { '?' }
          $versionOk = $mv -eq $bv
          $summary += "| Version sync (script=$mv, backend=$bv) | $( if ($versionOk) { ':white_check_mark:' } else { ':x: Mismatch' } ) |"

          $summary += ""
          $summary += "_Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID_"

          $summary -join "`n" >> $env:GITHUB_STEP_SUMMARY

      - name: Source shape metrics
        if: ${{ always() }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $keyFiles = @(
              'LibreSpot.ps1',
              'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1',
              'src/LibreSpot.Desktop/ViewModels/MainViewModel.cs',
              'src/LibreSpot.Desktop/Models/AppCatalog.cs',
              'src/LibreSpot.Desktop/MainWindow.xaml'
          )

          $rows = @()
          foreach ($file in $keyFiles) {
              if (-not (Test-Path $file)) {
                  $rows += [pscustomobject]@{ File = $file; Lines = 'missing'; Functions = '-' }
                  continue
              }
              $lineCount = (Get-Content $file).Count
              $funcCount = '-'
              if ($file -like '*.ps1') {
                  $funcCount = ([regex]::Matches((Get-Content $file -Raw), '(?m)^\s*function\s+')).Count
              }
              $rows += [pscustomobject]@{ File = $file; Lines = $lineCount; Functions = $funcCount }
          }

          $csCount = (Get-ChildItem -Path src -Recurse -Filter '*.cs' |
              Where-Object { $_.FullName -notmatch '[\\/](obj|bin)[\\/]' }).Count
          $testCount = (Get-ChildItem -Path tests -Recurse -Filter '*.cs' |
              Where-Object { $_.FullName -notmatch '[\\/](obj|bin)[\\/]' }).Count

          # Build summary table
          $summary = @()
          $summary += "## Source Shape Metrics"
          $summary += ""
          $summary += "| File | Lines | Functions |"
          $summary += "|------|------:|----------:|"
          foreach ($r in $rows) {
              $summary += "| ``$($r.File)`` | $($r.Lines) | $($r.Functions) |"
          }
          $summary += ""
          $summary += "| Aggregate | Count |"
          $summary += "|-----------|------:|"
          $summary += "| C# sources under ``src/`` | $csCount |"
          $summary += "| Test files under ``tests/`` | $testCount |"

          # Budget threshold warnings
          $warnings = @()
          $lsRow = $rows | Where-Object { $_.File -eq 'LibreSpot.ps1' }
          if ($lsRow -and $lsRow.Lines -ne 'missing' -and [int]$lsRow.Lines -gt 7000) {
              $warnings += "LibreSpot.ps1 is $($lsRow.Lines) lines (budget: 7000)"
          }
          $mvRow = $rows | Where-Object { $_.File -like '*MainViewModel.cs' }
          if ($mvRow -and $mvRow.Lines -ne 'missing' -and [int]$mvRow.Lines -gt 3000) {
              $warnings += "MainViewModel.cs is $($mvRow.Lines) lines (budget: 3000)"
          }
          $beRow = $rows | Where-Object { $_.File -like '*LibreSpot.Backend.ps1' }
          if ($beRow -and $beRow.Lines -ne 'missing' -and [int]$beRow.Lines -gt 3500) {
              $warnings += "LibreSpot.Backend.ps1 is $($beRow.Lines) lines (budget: 3500)"
          }

          if ($warnings.Count -gt 0) {
              $summary += ""
              $summary += "### :warning: Budget Warnings"
              $summary += ""
              foreach ($w in $warnings) {
                  $summary += "- $w"
                  Write-Host "::warning::$w"
              }
          }

          $summary -join "`n" >> $env:GITHUB_STEP_SUMMARY

          # Echo to log
          foreach ($r in $rows) {
              Write-Host "$($r.File): $($r.Lines) lines, $($r.Functions) functions"
          }
          Write-Host "C# sources: $csCount | Test files: $testCount"

      - name: NuGet vulnerability audit
        shell: pwsh
        env:
          NUGET_AUDIT_LEVEL: moderate
        run: |
          $ErrorActionPreference = 'Stop'
          $severityRank = @{
              low = 1
              moderate = 2
              high = 3
              critical = 4
          }
          $threshold = $env:NUGET_AUDIT_LEVEL.ToLowerInvariant()
          if (-not $severityRank.ContainsKey($threshold)) {
              throw "Unsupported NuGet audit threshold '$($env:NUGET_AUDIT_LEVEL)'."
          }
          $projects = @(
              'src/LibreSpot.Desktop/LibreSpot.Desktop.csproj',
              'tests/LibreSpot.Desktop.Tests/LibreSpot.Desktop.Tests.csproj'
          )
          foreach ($project in $projects) {
              $output = dotnet list $project package --vulnerable --include-transitive --format json --output-version 1 --no-restore 2>&1 | Out-String
              if ($LASTEXITCODE -ne 0) {
                  Write-Host $output
                  throw "NuGet vulnerability audit failed for $project."
              }
              $report = $output | ConvertFrom-Json
              $findings = @()
              foreach ($reportedProject in @($report.projects)) {
                  foreach ($framework in @($reportedProject.frameworks)) {
                      foreach ($packageSet in @('topLevelPackages', 'transitivePackages')) {
                          foreach ($package in @($framework.$packageSet)) {
                              foreach ($vulnerability in @($package.vulnerabilities)) {
                                  $severity = ([string]$vulnerability.severity).ToLowerInvariant()
                                  if (-not $severityRank.ContainsKey($severity)) { continue }
                                  $findings += [pscustomobject]@{
                                      Project = $reportedProject.path
                                      Framework = $framework.framework
                                      Package = $package.id
                                      Resolved = $package.resolvedVersion
                                      Severity = $severity
                                      Advisory = $vulnerability.advisoryUrl
                                  }
                              }
                          }
                      }
                  }
              }
              $blocking = @($findings | Where-Object { $severityRank[$_.Severity] -ge $severityRank[$threshold] })
              if ($blocking.Count -gt 0) {
                  $blocking | Format-Table Project, Framework, Package, Resolved, Severity, Advisory -AutoSize | Out-String | Write-Host
                  throw "NuGet vulnerability audit found $($blocking.Count) $threshold-or-higher finding(s) in $project."
              }
              Write-Host "${project}: no $threshold-or-higher NuGet vulnerabilities found."
          }
