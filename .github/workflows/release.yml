name: Release

# Triggered when a version tag is pushed, e.g. `git tag v3.5.1 && git push --tags`.
# Builds the PS2EXE PowerShell .exe, the .NET 10 WPF self-contained .exe, uploads
# the raw LibreSpot.ps1 so `irm .../LibreSpot.ps1 | iex` works, emits SHA256
# checksums + CycloneDX SBOM, and attests provenance + SBOM via GitHub's built-in
# in-toto signer. Consumers verify with `gh attestation verify <asset> -R SysAdminDoc/LibreSpot`.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for manual release (e.g. v3.5.1)"
        required: true

permissions:
  contents: read     # default for all jobs; release job escalates per-job

env:
  DOTNET_TARGET_FRAMEWORK: net10.0-windows
  DOTNET_SDK_CHANNEL: 10.0.x
  DOTNET_SUPPORT_PHASE: active
  DOTNET_EOL_DATE: "2028-11-14"
  DOTNET_HOLD_DECISION: ".NET 10 LTS is the stable target through 2028-11-14."
  PS2EXE_VERSION: "1.0.18"
  CYCLONEDX_VERSION: "6.2.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight release; queue instead

jobs:
  # Runs before anything else. Cheap sanity checks catch the biggest foot-guns
  # (version drift, syntax errors) before we spend minutes on PS2EXE + dotnet publish.
  preflight:
    name: Preflight checks
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve tag and expected version
        id: resolve
        shell: pwsh
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Use environment variables instead of direct workflow-expression interpolation to
          # prevent script injection via the workflow_dispatch input.
          $tag = if ($env:INPUT_TAG) { $env:INPUT_TAG } else { $env:REF_NAME }
          if ([string]::IsNullOrWhiteSpace($tag)) { throw 'Release workflow could not resolve a tag.' }
          # Validate tag format to reject anything that is not a version tag.
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-(preview|rc)\.\d+)?$') { throw "Tag '$tag' does not match expected vN.N.N, vN.N.N-preview.N, or vN.N.N-rc.N format." }
          $version = $tag -replace '^v',''
          $isPrerelease = ($version -match '-(preview|rc)\.\d+$')
          $tagCommit = (git rev-parse "$tag^{commit}" 2>$null)
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($tagCommit)) {
              throw "Tag '$tag' does not exist locally after checkout. Push the tag before dispatching the release workflow."
          }
          $tagCommit = $tagCommit.Trim()
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and $tagCommit -ne $env:GITHUB_SHA) {
              throw "Manual release tag '$tag' points to $tagCommit but this workflow is running on $env:GITHUB_SHA. Dispatch the workflow from the exact tagged commit."
          }
          Write-Host "Tag:     $tag"
          Write-Host "Version: $version"
          Write-Host "Channel: $(if ($isPrerelease) { 'prerelease' } else { 'stable' })"
          Write-Host "Tag SHA: $tagCommit"
          "tag=$tag"         | Out-File -Append $env:GITHUB_OUTPUT
          "version=$version" | Out-File -Append $env:GITHUB_OUTPUT
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Assert versions match the tag
        shell: pwsh
        env:
          EXPECTED: ${{ steps.resolve.outputs.version }}
        run: |
          $expected = $env:EXPECTED
          $isPreviewTag = ($expected -match '-preview\.\d+$') -or ($expected -match '-rc\.\d+$')

          # Read all three version sources once.
          $ps1Match = Select-String -Path LibreSpot.ps1 -Pattern "^\$global:VERSION\s*=\s*'([^']+)'" -List
          if (-not $ps1Match) { throw 'Could not locate $global:VERSION in LibreSpot.ps1' }
          $ps1Version = $ps1Match.Matches[0].Groups[1].Value

          $backendMatch = Select-String -Path 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1' -Pattern "^\$global:VERSION\s*=\s*'([^']+)'" -List
          if (-not $backendMatch) { throw 'Could not locate $global:VERSION in Backend.ps1' }
          $backendVersion = $backendMatch.Matches[0].Groups[1].Value

          [xml]$csproj = Get-Content 'src/LibreSpot.Desktop/LibreSpot.Desktop.csproj'
          $csprojVersion = [string]$csproj.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($csprojVersion)) {
              throw 'LibreSpot.Desktop.csproj is missing a <Version> property.'
          }

          Write-Host "Tag:             v$expected"
          Write-Host "LibreSpot.ps1:   $ps1Version"
          Write-Host "Backend.ps1:     $backendVersion"
          Write-Host "csproj Version:  $csprojVersion"

          # Invariant that's ALWAYS true: the embedded Backend.ps1 is the exact
          # same logical artifact as LibreSpot.ps1 shipped by a given release,
          # so they must agree. The v3.5.1 hardening pass exists because these
          # drifted silently from 3.3.0 to 3.5.0 on the backend side.
          if ($ps1Version -ne $backendVersion) {
              throw "Backend.ps1 VERSION ($backendVersion) does not match LibreSpot.ps1 VERSION ($ps1Version). Sync them before tagging a release."
          }

          # The two release tracks:
          #   * v<major>.<minor>.<patch>           — stable PowerShell track. PS1 version must match the tag.
          #                                          csproj can be any preview and we leave it alone.
          #   * v<major>.<minor>.<patch>-preview.N — WPF preview track. csproj Version must match the tag.
          #                                          PS1 version can be any stable.
          if ($isPreviewTag) {
              if ($csprojVersion -ne $expected) {
                  throw "Preview tag $expected does not match csproj Version ($csprojVersion). Bump LibreSpot.Desktop.csproj before tagging."
              }
          } else {
              if ($ps1Version -ne $expected) {
                  throw "Stable tag $expected does not match LibreSpot.ps1 VERSION ($ps1Version). Bump the PowerShell script before tagging."
              }
          }

      - name: Runtime and build-tool lifecycle gate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          [xml]$desktopProject = Get-Content 'src/LibreSpot.Desktop/LibreSpot.Desktop.csproj'
          $targetFramework = [string]$desktopProject.Project.PropertyGroup.TargetFramework
          if ($targetFramework -ne $env:DOTNET_TARGET_FRAMEWORK) {
              throw "WPF TargetFramework is $targetFramework but release policy expects $env:DOTNET_TARGET_FRAMEWORK. Update the lifecycle gate with the migration decision."
          }

          $eol = [datetime]::ParseExact($env:DOTNET_EOL_DATE, 'yyyy-MM-dd', [Globalization.CultureInfo]::InvariantCulture)
          $today = (Get-Date).Date
          $daysRemaining = ($eol.Date - $today).Days

          Write-Host "WPF TargetFramework:       $env:DOTNET_TARGET_FRAMEWORK"
          Write-Host ".NET SDK channel:          $env:DOTNET_SDK_CHANNEL"
          Write-Host ".NET support phase:        $env:DOTNET_SUPPORT_PHASE"
          Write-Host ".NET support end date:     $($eol.ToString('yyyy-MM-dd'))"
          Write-Host "Days until support ends:   $daysRemaining"
          Write-Host "PS2EXE version pin:        $env:PS2EXE_VERSION"
          Write-Host "CycloneDX version pin:     $env:CYCLONEDX_VERSION"
          Write-Host "Lifecycle decision:        $env:DOTNET_HOLD_DECISION"

          if ($daysRemaining -lt 0) {
              throw ".NET target $env:DOTNET_TARGET_FRAMEWORK reached end of support on $($eol.ToString('yyyy-MM-dd')). Retarget to .NET 10 or add an explicit release exception before tagging."
          }
          if ($daysRemaining -le 120) {
              Write-Warning ".NET target $env:DOTNET_TARGET_FRAMEWORK is within 120 days of end of support. $env:DOTNET_HOLD_DECISION"
          }

      - name: PowerShell syntax check (Windows PowerShell 5.1)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Host: $($PSVersionTable.PSVersion)"
          $files = @('LibreSpot.ps1', 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1')
          foreach ($file in $files) {
              $tokens = $null
              $parseErrors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
              if ($parseErrors -and $parseErrors.Count -gt 0) {
                  $parseErrors | ForEach-Object { Write-Host "  $($_.Message) at $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber)" }
                  throw "$file has $($parseErrors.Count) parse error(s)."
              }
              Write-Host "  $file parsed cleanly"
          }

      - name: PowerShell syntax check (PowerShell 7)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Host: $($PSVersionTable.PSVersion)"
          $files = @('LibreSpot.ps1', 'src/LibreSpot.Desktop/Backend/LibreSpot.Backend.ps1')
          $parseErrors = $null
          foreach ($file in $files) {
              $tokens = $null
              $parseErrors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
              if ($parseErrors -and $parseErrors.Count -gt 0) {
                  $parseErrors | ForEach-Object { Write-Host "  $($_.Message) at $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber)" }
                  throw "$file has $($parseErrors.Count) parse error(s)."
              }
              Write-Host "  $file parsed cleanly"
          }

      - name: Regression guard — foreign-patch signatures
        shell: pwsh
        run: |
          # These files are part of every legitimate Spotify install (chrome_elf.dll)
          # or produced by LibreSpot's own SpotX runs (xpui.spa.bak). If they ever
          # come back into Get-ExistingSpotifyPatchSignature we warn on every launch.
          # See CHANGELOG v3.5.1 for context.
          $content = Get-Content LibreSpot.ps1 -Raw
          $signatureBlockPattern = '(?s)function Get-ExistingSpotifyPatchSignature.+?\n\}'
          $match = [regex]::Match($content, $signatureBlockPattern)
          if (-not $match.Success) {
              throw 'Could not locate Get-ExistingSpotifyPatchSignature in LibreSpot.ps1.'
          }
          $block = $match.Value
          foreach ($forbidden in 'chrome_elf.dll','xpui.spa.bak') {
              # Allow mentions in the comment block (intentional historical note) but
              # reject any Test-Path style reference elsewhere in the function.
              $bodyOnly = ($block -split '\r?\n' | Where-Object { $_ -notmatch '^\s*#' }) -join "`n"
              if ($bodyOnly -match [regex]::Escape($forbidden)) {
                  throw "Get-ExistingSpotifyPatchSignature must not reference $forbidden — it produces a false positive on every run."
              }
          }
          Write-Host 'Foreign-patch signature list looks safe.'

  build-powershell:
    name: Build PowerShell EXE (PS2EXE)
    needs: preflight
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_RELEASE_POLICY_SLUG: ${{ vars.SIGNPATH_RELEASE_POLICY_SLUG }}
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install PS2EXE module (pinned)
        shell: pwsh
        # Pin so a breaking PS2EXE release can't silently corrupt a tag build.
        # Bump alongside a tested local run when updating.
        run: Install-Module -Name ps2exe -RequiredVersion $env:PS2EXE_VERSION -Force -Scope CurrentUser -AllowClobber

      - name: Compile LibreSpot.exe
        shell: pwsh
        run: |
          Invoke-PS2EXE `
            -InputFile LibreSpot.ps1 `
            -OutputFile LibreSpot.exe `
            -IconFile icon.ico `
            -Title LibreSpot `
            -NoConsole `
            -RequireAdmin
          if (-not (Test-Path LibreSpot.exe)) { throw 'PS2EXE did not produce LibreSpot.exe' }

      # SignPath Foundation signing — fires only when the repo has both the
      # API token (secret) and the identifiers (variables) configured. See
      # SIGNPATH.md for enrollment steps. Until set up, every release ships
      # unsigned exactly as it did before v3.6.0, with SBOM + SLSA attestations.
      - name: Upload PS2EXE artifact for SignPath
        id: upload-unsigned-ps
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORGANIZATION_ID != '' }}
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: librespot-ps-unsigned
          path: LibreSpot.exe

      - name: Submit LibreSpot.exe to SignPath
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORGANIZATION_ID != '' }}
        # signpath/github-action-submit-signing-request v2
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_RELEASE_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-ps.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Swap in signed LibreSpot.exe
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORGANIZATION_ID != '' }}
        shell: pwsh
        run: |
          if (-not (Test-Path signed/LibreSpot.exe)) {
            throw 'SignPath did not return a signed LibreSpot.exe in the output directory.'
          }
          Copy-Item signed/LibreSpot.exe LibreSpot.exe -Force
          $sig = Get-AuthenticodeSignature LibreSpot.exe
          if ($sig.Status -ne 'Valid') {
            throw "Signed LibreSpot.exe has an invalid Authenticode status: $($sig.Status) ($($sig.StatusMessage))"
          }
          Write-Host "Signed by: $($sig.SignerCertificate.Subject)"

      - name: Upload PS2EXE + raw script
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: librespot-powershell
          # Ship the raw .ps1 too so the `irm .../LibreSpot.ps1 | iex` one-liner
          # in the README resolves to an actual asset.
          path: |
            LibreSpot.exe
            LibreSpot.ps1

  build-wpf:
    name: Build WPF self-contained (.NET 10)
    needs: preflight
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_RELEASE_POLICY_SLUG: ${{ vars.SIGNPATH_RELEASE_POLICY_SLUG }}
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup .NET 10
        # actions/setup-dotnet v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: ${{ env.DOTNET_SDK_CHANNEL }}

      - name: Report resolved .NET SDK patch
        shell: pwsh
        run: |
          $sdkVersion = (dotnet --version).Trim()
          if ($sdkVersion -notmatch '^10\.0\.') {
              throw "Expected a 10.0.x SDK from setup-dotnet but resolved $sdkVersion."
          }
          Write-Host "Resolved .NET SDK patch: $sdkVersion"
          dotnet --info

      - name: Restore test graph with locked NuGet audit
        run: |
          dotnet restore src/LibreSpot.Desktop/LibreSpot.Desktop.csproj --locked-mode -p:AuditPipeline=true
          dotnet restore tests/LibreSpot.Desktop.Tests/LibreSpot.Desktop.Tests.csproj --no-dependencies -p:AuditPipeline=true

      - name: Run unit tests
        # Stops a broken regression from shipping. AppCatalogTests +
        # ConfigurationServiceTests already cover the config surface.
        run: dotnet test tests/LibreSpot.Desktop.Tests/LibreSpot.Desktop.Tests.csproj -c Release --nologo --no-restore

      - name: Restore WPF publish graph with locked NuGet audit
        run: dotnet restore src/LibreSpot.Desktop/LibreSpot.Desktop.csproj -r win-x64 --locked-mode -p:AuditPipeline=true

      - name: Publish WPF shell (win-x64, self-contained, single-file)
        run: >
          dotnet publish src/LibreSpot.Desktop/LibreSpot.Desktop.csproj
          -c Release
          -r win-x64
          --no-restore
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/wpf

      - name: Record publish footprint
        shell: pwsh
        run: |
          $exe = 'publish/wpf/LibreSpot.exe'
          if (-not (Test-Path $exe)) { throw "WPF publish output not found at $exe" }
          $sizeBytes = (Get-Item $exe).Length
          $sizeMiB = [math]::Round($sizeBytes / 1MB, 2)
          $budgetMiB = 200
          Compress-Archive -Path $exe -DestinationPath 'publish/wpf/LibreSpot-Desktop.zip' -Force
          $compressedBytes = (Get-Item 'publish/wpf/LibreSpot-Desktop.zip').Length
          $compressedMiB = [math]::Round($compressedBytes / 1MB, 2)
          $compressionRatio = [math]::Round($compressedBytes / $sizeBytes * 100, 1)
          $budgetMiB = 200
          $metrics = @{
              schemaVersion = 1
              artifact = 'LibreSpot-Desktop.exe'
              rid = 'win-x64'
              sizeBytes = $sizeBytes
              sizeMiB = $sizeMiB
              compressedBytes = $compressedBytes
              compressedMiB = $compressedMiB
              compressionRatio = $compressionRatio
              budgetMiB = $budgetMiB
              overBudget = ($sizeMiB -gt $budgetMiB)
              publishMode = 'self-contained single-file'
              readyToRun = $false
              trimming = $false
              commitSha = $env:GITHUB_SHA
              tag = $env:GITHUB_REF_NAME
          }
          $metrics | ConvertTo-Json -Depth 4 | Set-Content 'publish/wpf/publish-footprint.json' -Encoding UTF8
          Remove-Item 'publish/wpf/LibreSpot-Desktop.zip' -Force
          $summary = @()
          $summary += "### WPF Publish Footprint"
          $summary += ""
          $summary += "| Metric | Value |"
          $summary += "|--------|------:|"
          $summary += "| ``LibreSpot-Desktop.exe`` size | $sizeMiB MiB ($sizeBytes bytes) |"
          $summary += "| Compressed size | $compressedMiB MiB ($compressionRatio% of raw) |"
          $summary += "| Budget | $budgetMiB MiB |"
          $summary += "| ReadyToRun | disabled |"
          $summary += "| Trimming | disabled |"
          if ($sizeMiB -gt $budgetMiB) {
              $summary += "| :warning: Over budget | $([math]::Round($sizeMiB - $budgetMiB, 2)) MiB |"
              Write-Host "::warning::WPF exe is $sizeMiB MiB, exceeding the $budgetMiB MiB budget."
          }
          $summary -join "`n" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "WPF exe: $sizeMiB MiB ($sizeBytes bytes), compressed: $compressedMiB MiB ($compressionRatio%), budget: $budgetMiB MiB"

      - name: Install CycloneDX tool
        # Pin version to prevent breaking SBOM format changes from upstream.
        run: dotnet tool install --global CycloneDX --version $env:CYCLONEDX_VERSION

      - name: Generate SBOM (CycloneDX)
        run: dotnet CycloneDX src/LibreSpot.Desktop/LibreSpot.Desktop.csproj -o publish/sbom --json

      - name: Rename SBOM + WPF artifact
        shell: pwsh
        run: |
          $sbom = Get-ChildItem publish/sbom -Filter '*.json' | Select-Object -First 1
          if (-not $sbom) { throw 'CycloneDX did not produce a JSON SBOM.' }
          Move-Item $sbom.FullName publish/wpf/LibreSpot.sbom.cdx.json

          if (-not (Test-Path 'publish/wpf/LibreSpot.exe')) { throw 'dotnet publish did not produce publish/wpf/LibreSpot.exe' }
          Move-Item publish/wpf/LibreSpot.exe publish/wpf/LibreSpot-Desktop.exe

      # SignPath Foundation signing for the WPF shell. Mirrors the PS2EXE path;
      # see SIGNPATH.md for enrollment.
      - name: Upload WPF EXE artifact for SignPath
        id: upload-unsigned-wpf
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORGANIZATION_ID != '' }}
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: librespot-wpf-unsigned
          path: publish/wpf/LibreSpot-Desktop.exe

      - name: Submit LibreSpot-Desktop.exe to SignPath
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORGANIZATION_ID != '' }}
        # signpath/github-action-submit-signing-request v2
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_RELEASE_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-wpf.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Swap in signed LibreSpot-Desktop.exe
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORGANIZATION_ID != '' }}
        shell: pwsh
        run: |
          if (-not (Test-Path signed/LibreSpot-Desktop.exe)) {
            throw 'SignPath did not return a signed LibreSpot-Desktop.exe in the output directory.'
          }
          Copy-Item signed/LibreSpot-Desktop.exe publish/wpf/LibreSpot-Desktop.exe -Force
          $sig = Get-AuthenticodeSignature publish/wpf/LibreSpot-Desktop.exe
          if ($sig.Status -ne 'Valid') {
            throw "Signed LibreSpot-Desktop.exe has an invalid Authenticode status: $($sig.Status) ($($sig.StatusMessage))"
          }
          Write-Host "Signed by: $($sig.SignerCertificate.Subject)"

      - name: Upload WPF artifact
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: librespot-wpf
          path: publish/wpf/

  release:
    name: Assemble release
    needs: [preflight, build-powershell, build-wpf]
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create/upload release assets
      id-token: write        # OIDC for attestation signing
      attestations: write    # actions/attest-build-provenance
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Download PowerShell artifact
        # actions/download-artifact v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: librespot-powershell
          path: release

      - name: Download WPF artifact
        # actions/download-artifact v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: librespot-wpf
          path: release

      - name: Generate SHA256 checksums
        working-directory: release
        run: |
          set -euo pipefail
          # Explicit list — glob expansion can silently hide a missing file.
          sha256sum \
            LibreSpot.exe \
            LibreSpot.ps1 \
            LibreSpot-Desktop.exe \
            LibreSpot.sbom.cdx.json \
            > checksums.txt
          cat checksums.txt

      - name: Generate release manifest
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          IS_PRERELEASE: ${{ needs.preflight.outputs.is_prerelease }}
        working-directory: release
        run: |
          set -euo pipefail
          generate_entry() {
            local file="$1" role="$2" rid="${3:-any}"
            local size sha
            size=$(stat -c%s "$file")
            sha=$(sha256sum "$file" | cut -d' ' -f1)
            cat <<ENTRY
            {
              "artifact": "$file",
              "role": "$role",
              "rid": "$rid",
              "sizeBytes": $size,
              "sha256": "$sha"
            }
          ENTRY
          }

          cat > librespot-release-manifest.json <<MANIFEST
          {
            "schemaVersion": 1,
            "tag": "${TAG}",
            "commitSha": "${GITHUB_SHA}",
            "isPrerelease": ${IS_PRERELEASE},
            "releaseUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}",
            "artifacts": [
              $(generate_entry "LibreSpot.ps1" "script"),
              $(generate_entry "LibreSpot.exe" "ps2exe" "win-x64"),
              $(generate_entry "LibreSpot-Desktop.exe" "wpf-shell" "win-x64"),
              $(generate_entry "LibreSpot.sbom.cdx.json" "sbom")
            ]
          }
          MANIFEST

          python3 -m json.tool librespot-release-manifest.json > /dev/null
          echo "Release manifest generated:"
          cat librespot-release-manifest.json

      - name: Attest build provenance
        # actions/attest-build-provenance v2.4.0
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            release/LibreSpot.exe
            release/LibreSpot.ps1
            release/LibreSpot-Desktop.exe

      - name: Attest SBOM
        # actions/attest-sbom v2.4.0
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b
        with:
          subject-path: release/LibreSpot-Desktop.exe
          sbom-path: release/LibreSpot.sbom.cdx.json

      - name: Ensure release exists, then upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          IS_PRERELEASE: ${{ needs.preflight.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          # Create the release if it doesn't already exist. --generate-notes
          # auto-populates the body from commits since the previous tag so we
          # always have at least a draft description before assets upload.
          release_flags=(--verify-tag --fail-on-no-commits)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
              release_flags+=(--prerelease --latest=false)
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
              gh release create "$TAG" --title "$TAG" --generate-notes "${release_flags[@]}"
          else
              existing_prerelease="$(gh release view "$TAG" --json isPrerelease --jq .isPrerelease)"
              if [[ "$existing_prerelease" != "$IS_PRERELEASE" ]]; then
                  echo "Existing release '$TAG' prerelease=$existing_prerelease does not match expected prerelease=$IS_PRERELEASE."
                  exit 1
              fi
          fi
          gh release upload "$TAG" \
              release/LibreSpot.exe \
              release/LibreSpot.ps1 \
              release/LibreSpot-Desktop.exe \
              release/LibreSpot.sbom.cdx.json \
              release/checksums.txt \
              release/librespot-release-manifest.json \
              --clobber

      - name: Post-upload contract audit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          IS_PRERELEASE: ${{ needs.preflight.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          echo "::group::Fetch published release metadata"
          release_json="$(gh release view "$TAG" --json assets,isPrerelease,isLatest)"
          echo "$release_json" | python3 -m json.tool
          echo "::endgroup::"

          errors=0
          fail() { echo "::error::$1"; errors=$((errors + 1)); }

          # 1. Verify every required artifact appears exactly once.
          required_assets=(
            LibreSpot.exe
            LibreSpot.ps1
            LibreSpot-Desktop.exe
            LibreSpot.sbom.cdx.json
            checksums.txt
            librespot-release-manifest.json
          )
          for asset in "${required_assets[@]}"; do
            count=$(ASSET_NAME="$asset" python3 -c "
          import json,sys,os
          assets=json.load(sys.stdin)['assets']
          print(sum(1 for a in assets if a['name']==os.environ['ASSET_NAME']))" <<< "$release_json")
            if [[ "$count" -ne 1 ]]; then
              fail "Asset '$asset' appears $count time(s) in release (expected exactly 1)."
            else
              echo "OK: $asset present"
            fi
          done

          # 2. Download checksums.txt and verify it has one entry per covered asset.
          gh release download "$TAG" --pattern checksums.txt --dir /tmp/audit --clobber
          checksum_covered=(
            LibreSpot.exe
            LibreSpot.ps1
            LibreSpot-Desktop.exe
            LibreSpot.sbom.cdx.json
          )
          for asset in "${checksum_covered[@]}"; do
            matches=$(grep -cF "$asset" /tmp/audit/checksums.txt || true)
            if [[ "$matches" -ne 1 ]]; then
              fail "checksums.txt has $matches entries for '$asset' (expected 1)."
            else
              echo "OK: checksums.txt covers $asset"
            fi
          done

          # 3. Verify prerelease flag matches expectations.
          actual_prerelease=$(echo "$release_json" | python3 -c "
          import json,sys; print(str(json.load(sys.stdin)['isPrerelease']).lower())")
          if [[ "$actual_prerelease" != "$IS_PRERELEASE" ]]; then
            fail "Prerelease flag mismatch: release has $actual_prerelease, expected $IS_PRERELEASE."
          else
            echo "OK: prerelease=$actual_prerelease matches expected=$IS_PRERELEASE"
          fi

          # 4. Verify build provenance attestation exists for each subject.
          provenance_subjects=(
            LibreSpot.exe
            LibreSpot.ps1
            LibreSpot-Desktop.exe
          )
          for subject in "${provenance_subjects[@]}"; do
            if ! gh attestation list --repo "$GITHUB_REPOSITORY" --subject "release/$subject" --format json 2>/dev/null | python3 -c "
          import json,sys; data=json.load(sys.stdin); sys.exit(0 if len(data)>0 else 1)" 2>/dev/null; then
              fail "No attestation found for '$subject'."
            else
              echo "OK: attestation exists for $subject"
            fi
          done

          # Final verdict.
          if [[ "$errors" -gt 0 ]]; then
            echo "::error::Post-upload contract audit failed with $errors error(s)."
            exit 1
          fi
          echo "Post-upload contract audit passed."
