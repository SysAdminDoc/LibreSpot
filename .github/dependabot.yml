version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/src/LibreSpot.Desktop"
      - "/tests/LibreSpot.Desktop.Tests"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      runtime-dependencies:
        patterns:
          - "Serilog*"
        update-types:
          - "minor"
          - "patch"
      test-dependencies:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "coverlet.collector"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:20"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      workflow-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
